<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="kitGrad" x1="214" y1="250" x2="386" y2="422" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pilotGrad" x1="614" y1="250" x2="786" y2="422" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="1014" y1="250" x2="1186" y2="422" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#B7791F"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="214" y1="730" x2="386" y2="902" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2F7D4F"/>
    </linearGradient>
    <style>
      .title { font: 800 52px Inter, Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 20px Inter, Arial, sans-serif; fill: #667085; }
      .cardTitle { font: 800 34px Inter, Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .tag { font: 700 15px Inter, Arial, sans-serif; fill: #0F766E; letter-spacing: 0; }
      .body { font: 500 18px Inter, Arial, sans-serif; fill: #667085; }
      .small { font: 700 14px Inter, Arial, sans-serif; fill: #8A9696; letter-spacing: 0; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="#EEF1F2"/>
  <text x="120" y="112" class="title">应用名称与图标方案</text>
  <text x="120" y="152" class="subtitle">面向全岗位快捷工具客户端，风格取向：冷静、高效、桌面命令中心。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="210" width="320" height="390" rx="28" fill="#FBFCFC"/>
    <rect x="214" y="250" width="172" height="172" rx="38" fill="url(#kitGrad)"/>
    <rect x="254" y="290" width="92" height="22" rx="6" fill="#FFFFFF" opacity="0.95"/>
    <rect x="254" y="328" width="58" height="22" rx="6" fill="#FFFFFF" opacity="0.76"/>
    <rect x="326" y="328" width="20" height="22" rx="6" fill="#50B8A9"/>
    <path d="M254 378H346" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
    <text x="160" y="480" class="cardTitle">DeskKit</text>
    <text x="160" y="512" class="tag">推荐 · 专业稳定</text>
    <text x="160" y="550" class="body">像一套放在桌面上的工具组。</text>
    <text x="160" y="578" class="small">图标：工具抽屉 + 命令条</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="210" width="320" height="390" rx="28" fill="#FBFCFC"/>
    <rect x="614" y="250" width="172" height="172" rx="38" fill="url(#pilotGrad)"/>
    <path d="M697 292L752 382L705 360L648 384L697 292Z" fill="#FFFFFF"/>
    <path d="M697 292L705 360L648 384L697 292Z" fill="#C7F4EE"/>
    <circle cx="700" cy="341" r="14" fill="#0F766E"/>
    <text x="560" y="480" class="cardTitle">ToolPilot</text>
    <text x="560" y="512" class="tag">效率感 · 可扩展</text>
    <text x="560" y="550" class="body">强调“带你快速抵达工具”。</text>
    <text x="560" y="578" class="small">图标：导航指针 + 中心点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="210" width="320" height="390" rx="28" fill="#FBFCFC"/>
    <rect x="1014" y="250" width="172" height="172" rx="38" fill="url(#boxGrad)"/>
    <path d="M1059 315L1100 291L1141 315V365L1100 389L1059 365V315Z" fill="#FFFFFF"/>
    <path d="M1059 315L1100 339L1141 315" stroke="#B7791F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1100 339V389" stroke="#111827" stroke-width="9" stroke-linecap="round"/>
    <text x="960" y="480" class="cardTitle">SwiftBox</text>
    <text x="960" y="512" class="tag">直接 · 记忆点强</text>
    <text x="960" y="550" class="body">像快速打开的工作百宝箱。</text>
    <text x="960" y="578" class="small">图标：立方工具盒</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="690" width="320" height="390" rx="28" fill="#FBFCFC"/>
    <rect x="214" y="730" width="172" height="172" rx="38" fill="url(#nodeGrad)"/>
    <circle cx="270" cy="786" r="20" fill="#FFFFFF"/>
    <circle cx="330" cy="846" r="20" fill="#FFFFFF"/>
    <circle cx="270" cy="846" r="13" fill="#BFF4E8"/>
    <path d="M284 800L316 832" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    <path d="M270 826V806" stroke="#BFF4E8" stroke-width="8" stroke-linecap="round"/>
    <text x="160" y="960" class="cardTitle">NaviKit</text>
    <text x="160" y="992" class="tag">轻量 · 清晰</text>
    <text x="160" y="1030" class="body">突出搜索、分类和工具连接。</text>
    <text x="160" y="1058" class="small">图标：节点连接 + 工具网络</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="690" width="720" height="390" rx="28" fill="#FBFCFC"/>
    <text x="568" y="760" class="cardTitle">我的建议</text>
    <text x="568" y="812" class="body">首选 DeskKit。它最像一个可信赖的桌面工具客户端，名称短、易读，</text>
    <text x="568" y="844" class="body">图标也适合在 macOS Dock、Windows 任务栏和 GitHub Release 中识别。</text>
    <text x="568" y="904" class="body">如果你想更像 uTools / Raycast 这种“启动器”，选 ToolPilot。</text>
    <text x="568" y="936" class="body">如果你想偏大众办公和轻快，选 SwiftBox。</text>
    <text x="568" y="996" class="small">确认后我会替换：Tauri productName、窗口标题、应用内品牌名、macOS/Windows 图标资源。</text>
  </g>
</svg>
