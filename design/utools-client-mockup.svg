<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="windowGrad" x1="120" y1="60" x2="1480" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="1190" y1="166" x2="1454" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <clipPath id="windowClip">
      <rect x="120" y="60" width="1360" height="880" rx="28"/>
    </clipPath>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #0F172A; }
      .section { font: 700 18px Inter, Arial, sans-serif; fill: #0F172A; }
      .label { font: 600 14px Inter, Arial, sans-serif; fill: #334155; }
      .muted { font: 500 13px Inter, Arial, sans-serif; fill: #64748B; }
      .small { font: 600 12px Inter, Arial, sans-serif; fill: #64748B; }
      .mono { font: 500 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .white { fill: #FFFFFF; }
      .navText { font: 650 15px Inter, Arial, sans-serif; fill: #475569; }
      .navActive { font: 700 15px Inter, Arial, sans-serif; fill: #FFFFFF; }
      .toolTitle { font: 700 15px Inter, Arial, sans-serif; fill: #0F172A; }
      .toolDesc { font: 500 12px Inter, Arial, sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#E7EDF4"/>
  <rect x="120" y="60" width="1360" height="880" rx="28" fill="url(#windowGrad)" filter="url(#softShadow)"/>

  <g clip-path="url(#windowClip)">
    <rect x="120" y="60" width="1360" height="62" fill="#FFFFFF"/>
    <circle cx="154" cy="91" r="7" fill="#EF4444"/>
    <circle cx="178" cy="91" r="7" fill="#F59E0B"/>
    <circle cx="202" cy="91" r="7" fill="#22C55E"/>
    <text x="232" y="99" class="label">QuickDesk</text>
    <text x="1364" y="98" class="small">Cmd/Ctrl + Shift + Space</text>

    <rect x="120" y="122" width="260" height="818" fill="#F8FAFC"/>
    <line x1="380" y1="122" x2="380" y2="940" stroke="#E2E8F0"/>

    <text x="154" y="178" class="title">工具工作台</text>
    <text x="154" y="206" class="muted">全岗位快捷工具，一键呼出。</text>

    <rect x="154" y="246" width="190" height="42" rx="8" fill="#0F172A"/>
    <text x="178" y="273" class="navActive">全部工具</text>
    <rect x="154" y="304" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="331" class="navText">前端开发</text>
    <rect x="154" y="362" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="389" class="navText">后端开发</text>
    <rect x="154" y="420" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="447" class="navText">测试 / QA</text>
    <rect x="154" y="478" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="505" class="navText">产品 / 运营</text>
    <rect x="154" y="536" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="563" class="navText">设计</text>
    <rect x="154" y="594" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="178" y="621" class="navText">办公通用</text>

    <text x="154" y="704" class="small">最近使用</text>
    <rect x="154" y="724" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="180" cy="749" r="11" fill="#DBEAFE"/>
    <text x="172" y="754" class="small" fill="#2563EB">H</text>
    <text x="204" y="745" class="label">HTTP 请求</text>
    <text x="204" y="764" class="muted">2 分钟前</text>
    <rect x="154" y="786" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="180" cy="811" r="11" fill="#DCFCE7"/>
    <text x="172" y="816" class="small" fill="#16A34A">J</text>
    <text x="204" y="807" class="label">JSON 工具</text>
    <text x="204" y="826" class="muted">今天</text>

    <rect x="420" y="158" width="1000" height="64" rx="12" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#cardShadow)"/>
    <circle cx="452" cy="190" r="12" stroke="#64748B" stroke-width="2"/>
    <line x1="461" y1="199" x2="469" y2="207" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <text x="492" y="197" style="font: 600 19px Inter, Arial, sans-serif; fill: #334155;">搜索工具、岗位或关键词，例如 Postman、取色器、时间戳</text>
    <rect x="1282" y="174" width="112" height="32" rx="8" fill="#F1F5F9"/>
    <text x="1300" y="195" class="small">Enter 打开</text>

    <text x="420" y="272" class="section">精选工具</text>
    <text x="520" y="272" class="muted">收藏、最近使用与岗位工具会优先展示。</text>

    <g filter="url(#cardShadow)">
      <rect x="420" y="304" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="444" y="328" width="38" height="38" rx="8" fill="#DBEAFE"/>
      <text x="456" y="353" class="label" fill="#2563EB">H</text>
      <text x="500" y="342" class="toolTitle">HTTP 请求</text>
      <text x="500" y="365" class="toolDesc">轻量 Postman</text>
      <text x="444" y="404" class="toolDesc">GET / POST / headers / body</text>
      <text x="610" y="330" class="small" fill="#F59E0B">★</text>

      <rect x="660" y="304" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="684" y="328" width="38" height="38" rx="8" fill="#DCFCE7"/>
      <text x="696" y="353" class="label" fill="#16A34A">J</text>
      <text x="740" y="342" class="toolTitle">JSON 工具</text>
      <text x="740" y="365" class="toolDesc">格式化 / 压缩</text>
      <text x="684" y="404" class="toolDesc">校验、复制、错误定位</text>

      <rect x="900" y="304" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="924" y="328" width="38" height="38" rx="8" fill="#FEE2E2"/>
      <text x="936" y="353" class="label" fill="#DC2626">C</text>
      <text x="980" y="342" class="toolTitle">取色器</text>
      <text x="980" y="365" class="toolDesc">HEX / RGB / HSL</text>
      <text x="924" y="404" class="toolDesc">图片取色、透明度预览</text>

      <rect x="1140" y="304" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="1164" y="328" width="38" height="38" rx="8" fill="#FEF3C7"/>
      <text x="1176" y="353" class="label" fill="#D97706">T</text>
      <text x="1220" y="342" class="toolTitle">时间戳</text>
      <text x="1220" y="365" class="toolDesc">Unix 时间互转</text>
      <text x="1164" y="404" class="toolDesc">本地时间、毫秒、复制</text>

      <rect x="420" y="444" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="444" y="468" width="38" height="38" rx="8" fill="#E0F2FE"/>
      <text x="456" y="493" class="label" fill="#0284C7">R</text>
      <text x="500" y="482" class="toolTitle">正则测试</text>
      <text x="500" y="505" class="toolDesc">匹配预览</text>
      <text x="444" y="544" class="toolDesc">flags、分组、匹配数量</text>

      <rect x="660" y="444" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="684" y="468" width="38" height="38" rx="8" fill="#EDE9FE"/>
      <text x="696" y="493" class="label" fill="#7C3AED">M</text>
      <text x="740" y="482" class="toolTitle">Mock 数据</text>
      <text x="740" y="505" class="toolDesc">测试数据生成</text>
      <text x="684" y="544" class="toolDesc">姓名、邮箱、地址、日期</text>

      <rect x="900" y="444" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="924" y="468" width="38" height="38" rx="8" fill="#ECFCCB"/>
      <text x="936" y="493" class="label" fill="#65A30D">U</text>
      <text x="980" y="482" class="toolTitle">URL 工具</text>
      <text x="980" y="505" class="toolDesc">编码 / 参数解析</text>
      <text x="924" y="544" class="toolDesc">Query 拆分、重组、复制</text>

      <rect x="1140" y="444" width="220" height="118" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="1164" y="468" width="38" height="38" rx="8" fill="#F1F5F9"/>
      <text x="1176" y="493" class="label" fill="#475569">Q</text>
      <text x="1220" y="482" class="toolTitle">二维码</text>
      <text x="1220" y="505" class="toolDesc">生成与复制</text>
      <text x="1164" y="544" class="toolDesc">文本、链接、短内容</text>
    </g>

    <text x="420" y="624" class="section">当前工具</text>
    <rect x="420" y="652" width="940" height="236" rx="14" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#cardShadow)"/>
    <rect x="420" y="652" width="940" height="58" rx="14" fill="#F8FAFC"/>
    <text x="448" y="688" class="section">HTTP 请求</text>
    <text x="564" y="688" class="muted">本地执行，不保存请求历史。</text>
    <rect x="1170" y="668" width="82" height="30" rx="8" fill="#0F172A"/>
    <text x="1195" y="688" class="small" fill="#FFFFFF">发送</text>
    <rect x="1264" y="668" width="70" height="30" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="1285" y="688" class="small">复制</text>

    <rect x="448" y="736" width="110" height="42" rx="8" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="482" y="762" class="label" fill="#2563EB">GET</text>
    <rect x="570" y="736" width="514" height="42" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="590" y="762" class="mono">https://api.example.com/users?page=1</text>
    <rect x="1098" y="736" width="236" height="42" rx="8" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="1120" y="762" class="label" fill="#16A34A">200 OK</text>
    <text x="1200" y="762" class="muted">128 ms · 18.4 KB</text>

    <rect x="448" y="804" width="404" height="56" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="468" y="826" class="small">Headers</text>
    <text x="468" y="848" class="mono">Authorization: Bearer ••••••••</text>
    <rect x="872" y="804" width="462" height="56" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="892" y="826" class="small">Response</text>
    <text x="892" y="848" class="mono">{ "id": 1001, "name": "Alex Chen", "role": "Designer" }</text>

    <rect x="1168" y="166" width="210" height="84" rx="14" fill="url(#accentGrad)" filter="url(#cardShadow)"/>
    <text x="1190" y="198" style="font: 700 18px Inter, Arial, sans-serif; fill: #FFFFFF;">快捷入口</text>
    <text x="1190" y="224" style="font: 500 13px Inter, Arial, sans-serif; fill: #DBEAFE;">收藏 6 个 · 今日使用 18 次</text>
  </g>
</svg>
